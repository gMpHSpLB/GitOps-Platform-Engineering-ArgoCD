apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/gMpHSpLB/Gitops-Argocd.git
    targetRevision: HEAD
    # Path containing Application manifests (not the Helm chart itself)
    path: gitops/applications
    # No helm: block — this path contains raw YAML Application manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
